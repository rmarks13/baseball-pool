<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px auto;
            max-width: 500px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-box button {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .search-box button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        .weather-card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
        }

        .current-weather {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            align-items: center;
        }

        .weather-info h2 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }

        .temp-display {
            font-size: 3.5em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
        }

        .weather-description {
            font-size: 1.2em;
            color: #666;
            text-transform: capitalize;
            margin-bottom: 20px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .detail-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-label {
            color: #888;
            font-size: 0.9em;
            font-weight: 600;
        }

        .detail-value {
            color: #333;
            font-size: 1.1em;
            font-weight: bold;
        }

        .weather-icon {
            font-size: 5em;
            text-align: center;
        }

        .forecast {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .forecast-item {
            background: #f9f9f9;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            border: 2px solid #eee;
            transition: all 0.3s ease;
        }

        .forecast-item:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .forecast-day {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
        }

        .forecast-icon {
            font-size: 2.5em;
            margin: 10px 0;
        }

        .forecast-temp {
            font-size: 0.9em;
            color: #666;
        }

        .forecast-max {
            color: #667eea;
            font-weight: 600;
        }

        .forecast-min {
            color: #999;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 1.2em;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .favorites {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .favorite-btn {
            padding: 8px 12px;
            background: white;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            color: #667eea;
            font-weight: 600;
            transition: all 0.3s ease;
            font-size: 0.9em;
        }

        .favorite-btn:hover {
            background: #667eea;
            color: white;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            border-bottom: 2px solid #eee;
        }

        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
            font-size: 1em;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .current-weather {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 1.8em;
            }

            .temp-display {
                font-size: 2.5em;
            }

            .forecast {
                grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Get real-time weather for any location</p>
        </header>

        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                onkeypress="handleKeyPress(event)"
            >
            <button onclick="searchWeather()">Search</button>
        </div>

        <div class="favorites">
            <button class="favorite-btn" onclick="loadCity('New York')">New York</button>
            <button class="favorite-btn" onclick="loadCity('London')">London</button>
            <button class="favorite-btn" onclick="loadCity('Tokyo')">Tokyo</button>
            <button class="favorite-btn" onclick="loadCity('Paris')">Paris</button>
            <button class="favorite-btn" onclick="loadCity('Sydney')">Sydney</button>
        </div>

        <div id="errorContainer"></div>
        <div id="loadingContainer"></div>
        <div id="weatherContainer"></div>
    </div>

    <script>
        const API_KEY = 'e3d0f9d3f4c1b8a2f9e8d7c6b5a4f3e2';
        const WEATHER_API = 'https://api.openweathermap.org/data/2.5/weather';
        const FORECAST_API = 'https://api.openweathermap.org/data/2.5/forecast';

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        }

        function showLoading() {
            const container = document.getElementById('loadingContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Fetching weather data...</p>
                </div>
            `;
        }

        function showError(message) {
            const container = document.getElementById('errorContainer');
            container.innerHTML = `<div class="error">⚠️ ${message}</div>`;
            document.getElementById('weatherContainer').innerHTML = '';
            document.getElementById('loadingContainer').innerHTML = '';
        }

        function clearError() {
            document.getElementById('errorContainer').innerHTML = '';
        }

        function getWeatherIcon(weatherMain) {
            const icons = {
                'Clear': '☀️',
                'Clouds': '☁️',
                'Rain': '🌧️',
                'Drizzle': '🌦️',
                'Thunderstorm': '⛈️',
                'Snow': '❄️',
                'Mist': '🌫️',
                'Smoke': '💨',
                'Haze': '🌫️',
                'Dust': '🌪️',
                'Fog': '🌫️',
                'Sand': '🏜️',
                'Ash': '🌋',
                'Squall': '💨',
                'Tornado': '🌪️'
            };
            return icons[weatherMain] || '🌤️';
        }

        function formatTime(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function formatDay(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) {
                showError('Please enter a city name');
                return;
            }
            await loadCity(city);
        }

        async function loadCity(city) {
            clearError();
            showLoading();
            document.getElementById('cityInput').value = city;

            try {
                const currentResponse = await fetch(
                    `${WEATHER_API}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
                );
                
                if (!currentResponse.ok) {
                    throw new Error('City not found. Please try again.');
                }

                const currentData = await currentResponse.json();

                const forecastResponse = await fetch(
                    `${FORECAST_API}?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`
                );
                
                const forecastData = await forecastResponse.json();

                displayWeather(currentData, forecastData);
                document.getElementById('loadingContainer').innerHTML = '';
            } catch (error) {
                showError(error.message);
            }
        }

        function displayWeather(currentData, forecastData) {
            const { name, sys, main, weather, wind, clouds, visibility } = currentData;
            const icon = getWeatherIcon(weather[0].main);
            const description = weather[0].description;

            const currentHtml = `
                <div class="weather-card">
                    <h2>${name}, ${sys.country}</h2>
                    <p style="color: #999; margin-bottom: 20px;">Last updated: ${formatTime(currentData.dt)}</p>
                    
                    <div class="current-weather">
                        <div class="weather-info">
                            <div class="weather-description">${description}</div>
                            <div class="temp-display">${Math.round(main.temp)}°C</div>
                            <div class="weather-details">
                                <div class="detail-item">
                                    <span class="detail-label">Feels Like</span>
                                    <span class="detail-value">${Math.round(main.feels_like)}°C</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Humidity</span>
                                    <span class="detail-value">${main.humidity}%</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Pressure</span>
                                    <span class="detail-value">${main.pressure} mb</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Wind Speed</span>
                                    <span class="detail-value">${Math.round(wind.speed * 3.6)} km/h</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Visibility</span>
                                    <span class="detail-value">${(visibility / 1000).toFixed(1)} km</span>
                                </div>
                                <div class="detail-item">
                                    <span class="detail-label">Cloud Cover</span>
                                    <span class="detail-value">${clouds.all}%</span>
                                </div>
                            </div>
                        </div>
                        <div class="weather-icon">${icon}</div>
                    </div>
                </div>
            `;

            const forecast5Day = [];
            forecastData.list.forEach(item => {
                const day = formatDay(item.dt);
                if (!forecast5Day.find(f => f.day === day)) {
                    forecast5Day.push({
                        day: day,
                        temp_max: item.main.temp_max,
                        temp_min: item.main.temp_min,
                        weather: item.weather[0].main,
                        icon: getWeatherIcon(item.weather[0].main)
                    });
                }
            });

            const forecastHtml = `
                <div class="weather-card">
                    <h3 style="margin-bottom: 20px; color: #333;">5-Day Forecast</h3>
                    <div class="forecast">
                        ${forecast5Day.slice(0, 5).map(day => `
                            <div class="forecast-item">
                                <div class="forecast-day">${day.day}</div>
                                <div class="forecast-icon">${day.icon}</div>
                                <div class="forecast-temp">
                                    <span class="forecast-max">${Math.round(day.temp_max)}°</span>
                                    <span class="forecast-min">${Math.round(day.temp_min)}°</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            document.getElementById('weatherContainer').innerHTML = currentHtml + forecastHtml;
        }

        // Load default city on page load
        window.addEventListener('load', () => {
            loadCity('New York');
        });
    </script>
</body>
</html>
